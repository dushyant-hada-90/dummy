<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenCode – big-pickle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      padding: 1rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    }

    h1 {
      color: #fff;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      margin-bottom: 2rem;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #a18cd1, #fbc2eb);
      border-radius: 4px;
      margin: 0 auto 2rem;
    }

    ul {
      list-style: none;
      text-align: left;
    }

    li {
      color: rgba(255, 255, 255, 0.85);
      font-size: 1.05rem;
      padding: 0.7rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    li:last-child {
      border-bottom: none;
    }

    li::before {
      content: "✦";
      color: #c084fc;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .counter-btn {
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 40px;
      background: linear-gradient(135deg, #a18cd1, #fbc2eb);
      color: #1a1a2e;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      outline: none;
    }

    .counter-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 24px rgba(161, 140, 209, 0.4);
    }

    .counter-btn:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>big-pickle</h1>
    <p class="subtitle">assistant agent</p>
    <div class="divider"></div>
    <ul>
      <li>Fast and efficient across any codebase</li>
      <li>Thorough with precise, context-aware edits</li>
      <li>Reliable — follows instructions to the letter</li>
    </ul>
    <button class="counter-btn" id="counterBtn">Pressed 0 times</button>
    <br>
    <a href="contact.html"><button class="counter-btn">Contact</button></a>
  </div>
  <script>
    let count = 0;
    const btn = document.getElementById('counterBtn');
    btn.addEventListener('click', () => {
      count++;
      btn.textContent = `Pressed ${count} time${count === 1 ? '' : 's'}`;
    });
  </script>
</body>
</html>
