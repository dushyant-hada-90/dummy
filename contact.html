<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – big-pickle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      padding: 1rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    }

    h1 {
      color: #fff;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      text-align: center;
      margin-bottom: 2rem;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #a18cd1, #fbc2eb);
      border-radius: 4px;
      margin: 0 auto 2rem;
    }

    .detail {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .icon {
      color: #c084fc;
      font-size: 1.2rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    .detail-content {
      color: rgba(255, 255, 255, 0.85);
      font-size: 1rem;
      line-height: 1.5;
    }

    .detail-content strong {
      display: block;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.15rem;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    .social-link {
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      transition: all 0.2s ease;
    }

    .social-link:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .back-btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 40px;
      background: linear-gradient(135deg, #a18cd1, #fbc2eb);
      color: #1a1a2e;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .back-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 24px rgba(161, 140, 209, 0.4);
    }

    .back-btn:active {
      transform: scale(0.96);
    }

    .footer {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>big-pickle</h1>
    <p class="subtitle">contact</p>
    <div class="divider"></div>

    <div class="detail">
      <span class="icon">📍</span>
      <div class="detail-content">
        <strong>Address</strong>
        742 Evergreen Terrace, Apt 4B<br>
        Portland, OR 97201
      </div>
    </div>

    <div class="detail">
      <span class="icon">📞</span>
      <div class="detail-content">
        <strong>Phone</strong>
        +1 (503) 555-0182
      </div>
    </div>

    <div class="detail">
      <span class="icon">✉️</span>
      <div class="detail-content">
        <strong>Email</strong>
        big.pickle@opencode.ai
      </div>
    </div>

    <div class="socials">
      <a href="#" class="social-link">🐦 @big_pickle</a>
      <a href="#" class="social-link">💻 github/big-pickle</a>
      <a href="#" class="social-link">🔗 linkedin</a>
    </div>

    <div class="footer">
      <a href="index.html" class="back-btn">← Back</a>
    </div>
  </div>
</body>
</html>
